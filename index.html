<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- Mobile / iOS: full screen game, no accidental zoom, safe areas -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#1a120c" />
    <meta name="format-detection" content="telephone=no" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./favicon.svg" />
    <title>Lancet & Linen — A Bader’s Life</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      html, body {
        width: 100%;
        height: 100%;
        height: var(--app-height, 100%);
        height: 100dvh;
        overflow: hidden;
        background: #1a120c;
        font-family: "Palatino Linotype", "Book Antiqua", Palatino, Georgia, serif;
        touch-action: none;
        overscroll-behavior: none;
        position: fixed;
        inset: 0;
        /* iOS notch / home indicator */
        padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      }
      #game-container {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        touch-action: none;
        user-select: none;
        -webkit-user-select: none;
      }
      #game-container canvas {
        display: block;
        max-width: 100%;
        max-height: 100%;
        touch-action: none;
      }
      /*
       * Portrait phones.
       *
       * The game draws 16:9. On a 9:19.5 phone held upright, Scale.FIT does the
       * only thing it can and the canvas ends up filling ~26% of the screen
       * height — a letterboxed strip that reads as "the game is broken", which
       * is exactly how it was reported. It is not broken; it is the wrong shape
       * of screen.
       *
       * The old hint was a thin bar at the bottom while the tiny game kept
       * running behind it, which did not communicate that. Cover the screen
       * instead, so the state is unambiguous and the fix is obvious.
       */
      #rotate-hint {
        display: none;
        position: fixed;
        z-index: 50;
        inset: 0;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        padding: 24px;
        background: #1a120c;
        color: #e8d5a8;
        text-align: center;
        font-size: 17px;
        line-height: 1.5;
      }
      #rotate-hint .glyph {
        font-size: 56px;
        color: #c9a227;
        animation: tilt 2.4s ease-in-out infinite;
      }
      #rotate-hint .sub { font-size: 13px; color: #9a8878; }
      @keyframes tilt {
        0%, 45%, 100% { transform: rotate(0deg); }
        60%, 85% { transform: rotate(-90deg); }
      }
      @media (prefers-reduced-motion: reduce) {
        #rotate-hint .glyph { animation: none; }
      }
      @media (orientation: portrait) and (max-width: 900px) {
        #rotate-hint { display: flex; }
      }
    </style>
  </head>
  <body>
    <div id="game-container"></div>
    <div id="rotate-hint">
      <div class="glyph">▭</div>
      <div>Bitte das Gerät quer halten<br />Please turn your device sideways</div>
      <div class="sub">
        Lancet &amp; Linen wird im Querformat 16:9 gezeichnet.<br />
        Lancet &amp; Linen is drawn in 16:9 landscape.
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
