<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- Mobile / iOS: full screen game, no accidental zoom, safe areas -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#1a120c" />
    <meta name="format-detection" content="telephone=no" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./favicon.svg" />
    <title>Lancet & Linen — A Bader’s Life</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      html, body {
        width: 100%;
        height: 100%;
        height: var(--app-height, 100%);
        height: 100dvh;
        overflow: hidden;
        background: #1a120c;
        font-family: "Palatino Linotype", "Book Antiqua", Palatino, Georgia, serif;
        touch-action: none;
        overscroll-behavior: none;
        position: fixed;
        inset: 0;
        /* iOS notch / home indicator */
        padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      }
      #game-container {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        touch-action: none;
        user-select: none;
        -webkit-user-select: none;
      }
      #game-container canvas {
        display: block;
        max-width: 100%;
        max-height: 100%;
        touch-action: none;
      }
      /* Portrait phones: soft hint; game still runs in FIT mode */
      #rotate-hint {
        display: none;
        position: fixed;
        z-index: 50;
        left: 0; right: 0; bottom: 0;
        padding: 10px 14px calc(10px + env(safe-area-inset-bottom));
        background: rgba(26, 18, 12, 0.88);
        color: #e8d5a8;
        font-size: 13px;
        text-align: center;
        pointer-events: none;
      }
      @media (orientation: portrait) and (max-width: 900px) {
        #rotate-hint { display: block; }
      }
    </style>
  </head>
  <body>
    <div id="game-container"></div>
    <div id="rotate-hint">Tip: landscape feels best on phones — the game works in portrait too.</div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
